<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Advanced Hotel Management</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <header>🏨 Advanced Hotel Management</header>

    <div class="stats">
      <div class="stat-box">Bookings: <span id="totalBookings">0</span></div>
      <div class="stat-box">Revenue: $<span id="totalRevenue">0</span></div>
    </div>

    <div class="container">
      <div class="card form-section">
        <h3>Room Booking</h3>
        <form id="form">
          <input type="text" id="name" placeholder="Guest Name" required />

          <select id="room" required>
            <option value="">Room Type</option>
            <option value="Single">Single</option>
            <option value="Double">Double</option>
            <option value="Deluxe">Deluxe</option>
            <option value="Suite">Suite</option>
          </select>

          <input type="date" id="checkIn" required />
          <input type="date" id="checkOut" required />

          <button type="submit">Save Booking</button>
        </form>
      </div>

      <div class="card table-section">
        <h3>Bookings</h3>

        <input type="text" id="search" placeholder="Search by name..." />

        <select id="filter">
          <option value="">All Rooms</option>
          <option value="Single">Single</option>
          <option value="Double">Double</option>
          <option value="Deluxe">Deluxe</option>
          <option value="Suite">Suite</option>
        </select>

        <table>
          <thead>
            <tr>
              <th>Name</th>
              <th>Room</th>
              <th>Days</th>
              <th>Price</th>
              <th>Actions</th>
            </tr>
          </thead>
          <tbody id="list"></tbody>
        </table>
      </div>
    </div>

    <script src="script.js"></script>
  </body>
</html>
